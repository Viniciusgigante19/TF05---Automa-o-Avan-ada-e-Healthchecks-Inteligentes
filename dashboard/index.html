<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Monitoramento</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Dashboard de Monitoramento</h1>
            <div class="status-overview">
                <div class="status-card" id="overall-status">
                    <h3>Status Geral</h3>
                    <span class="status-indicator">●</span>
                    <span class="status-text">Carregando...</span>
                </div>
            </div>
        </header>

        <main>
            <section class="services-grid" id="services-grid">
                <!-- Cards de serviços serão inseridos pelo JS -->
            </section>

            <section class="charts-section">
                <div class="chart-container">
                    <h3>Response Time (ms)</h3>
                    <canvas id="responseTimeChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Uptime (%)</h3>
                    <canvas id="uptimeChart"></canvas>
                </div>
            </section>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
