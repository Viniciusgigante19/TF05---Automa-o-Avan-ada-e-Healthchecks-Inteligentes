services:
  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "3000:80"
    networks:
      - monitor-net
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_DATABASE: app
      MYSQL_ROOT_PASSWORD: pass
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h db -u root -ppass || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3307:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"

networks:
  monitor-net:
    driver: bridge